<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de la Noticia | Ruido Hoy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils/parser.js"></script>
    <script src="js/app.js"></script>

</head>

<body>

    <div id="navbar-placeholder"></div>

    <div class="container" style="margin-top: 120px; max-width: 800px;">
        <article id="news-content">
            <div class="text-center my-5">
                <div class="spinner-border text-light" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </article>

        <section id="comments-section" class="mt-5 pt-5 border-top border-secondary">
            <h3>Comentarios</h3>
            <div id="comments-list" class="mt-4">
            </div>

            <div id="comment-form-container" class="mt-5">
                <h4>Escribe un comentario</h4>
                <div id="auth-reminder" class="alert alert-dark" style="display: none;">
                    Por favor <a href="auth.html">inicia sesión</a> para comentar.
                </div>
                <form id="comment-form" onsubmit="postComment(event)" style="display: none;">
                    <div class="mb-3">
                        <textarea class="form-control" id="commentContent" rows="3" required
                            placeholder="Escribe tu comentario..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Comentar</button>
                </form>
            </div>
        </section>
    </div>

    <div id="footer-placeholder"></div>

</body>

</html>
