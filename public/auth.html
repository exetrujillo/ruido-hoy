<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Ruido Hoy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script defer src="js/app.js"></script>
</head>

<body class="auth-page d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div id="navbar-placeholder"></div>

    <div class="container" style="max-width: 400px;">

        <div class="card bg-dark border-secondary p-4">
            <h2 class="text-center mb-4" id="auth-title">INICIAR SESIÓN</h2>

            <form id="login-form">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="loginEmail" required>
                </div>
                <div class="mb-3">
                    <label for="loginPassword" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                <p class="mt-3 text-center small text-body-secondary">
                    ¿No tienes una cuenta? <a href="#" onclick="toggleAuth(false)">Registrarse</a>
                </p>
            </form>

            <form id="register-form" style="display: none;">
                <div class="mb-3">
                    <label for="regName" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="regName" required>
                </div>
                <div class="mb-3">
                    <label for="regEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="regEmail" required>
                </div>
                <div class="mb-3">
                    <label for="regPassword" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Crear Cuenta</button>
                <p class="mt-3 text-center small text-body-secondary">
                    ¿Ya tienes una cuenta? <a href="#" onclick="toggleAuth(true)">Iniciar Sesión</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        function toggleAuth(showLogin) {
            document.getElementById('login-form').style.display = showLogin ? 'block' : 'none';
            document.getElementById('register-form').style.display = showLogin ? 'none' : 'block';
            document.getElementById('auth-title').innerText = showLogin ? 'INICIAR SESIÓN' : 'REGISTRARSE';
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert('Error de conexión');
            }
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    alert('Usuario registrado correctamente. Por favor, inicie sesión.');
                    toggleAuth(true);
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert('Error de conexión');
            }
        };
    </script>
</body>

</html>
